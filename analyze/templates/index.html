<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Logic Flow Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
        .chunk-hover:hover { background-color: #f1f5f9; cursor: help; }
        .tooltip { visibility: hidden; position: absolute; z-index: 10; padding: 0.5rem; background: #1e293b; color: white; border-radius: 0.375rem; font-size: 0.75rem; max-width: 200px; }
        .chunk-span:hover .tooltip { visibility: visible; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Logic Flow Analyzer</h1>
                <p class="text-slate-500 font-medium">Native Speaker Reading Path Debugger</p>
            </div>
            <div id="status" class="hidden animate-pulse flex items-center gap-2 text-blue-600 font-semibold">
                <div class="w-2 h-2 bg-blue-600 rounded-full"></div>
                Analyzing Logic...
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Input -->
            <section class="lg:col-span-5 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wider">Input Complex Text</label>
                    <textarea 
                        id="inputText" 
                        class="w-full h-80 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all resize-none text-slate-800 leading-relaxed"
                        placeholder="Paste long or difficult sentences here... (e.g., 'What is often forgotten, however, is that even the most advanced AI requires human oversight.')"
                    ></textarea>
                    <button 
                        id="analyzeBtn"
                        class="mt-6 w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg active:scale-[0.98]"
                    >
                        Analyze Logic Flow
                    </button>
                </div>
            </section>

            <!-- Right: Results -->
            <section class="lg:col-span-7">
                <div id="resultsWrapper" class="hidden h-full">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[calc(100vh-200px)]">
                        <!-- Tabs Header -->
                        <div class="flex border-b border-slate-100 px-6">
                            <button id="tab1Btn" class="py-4 px-6 font-bold text-sm uppercase tracking-widest tab-active transition-colors">Logic Flow</button>
                            <button id="tab2Btn" class="py-4 px-6 font-bold text-sm uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-colors">Visual Map</button>
                        </div>

                        <!-- Content Area -->
                        <div id="tabContent" class="p-6 overflow-y-auto flex-grow">
                            <!-- Tab 1: Logic Flow -->
                            <div id="logicFlowView" class="space-y-8"></div>
                            <!-- Tab 2: Visual Map -->
                            <div id="visualMapView" class="hidden space-y-8"></div>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="h-full flex flex-col items-center justify-center bg-slate-100/50 border-2 border-dashed border-slate-200 rounded-2xl p-12">
                    <div class="w-16 h-16 bg-slate-200 rounded-full mb-4 flex items-center justify-center">
                        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <p class="text-slate-400 font-medium">Awaiting input for cognitive analysis...</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        let analysisData = null;

        const analyzeBtn = document.getElementById('analyzeBtn');
        const inputText = document.getElementById('inputText');
        const status = document.getElementById('status');
        const emptyState = document.getElementById('emptyState');
        const resultsWrapper = document.getElementById('resultsWrapper');
        
        const tab1Btn = document.getElementById('tab1Btn');
        const tab2Btn = document.getElementById('tab2Btn');
        const logicFlowView = document.getElementById('logicFlowView');
        const visualMapView = document.getElementById('visualMapView');

        // Tab Switching Logic
        tab1Btn.addEventListener('click', () => {
            tab1Btn.classList.add('tab-active');
            tab1Btn.classList.remove('text-slate-400');
            tab2Btn.classList.remove('tab-active');
            tab2Btn.classList.add('text-slate-400');
            logicFlowView.classList.remove('hidden');
            visualMapView.classList.add('hidden');
        });

        tab2Btn.addEventListener('click', () => {
            tab2Btn.classList.add('tab-active');
            tab2Btn.classList.remove('text-slate-400');
            tab1Btn.classList.remove('tab-active');
            tab1Btn.classList.add('text-slate-400');
            visualMapView.classList.remove('hidden');
            logicFlowView.classList.add('hidden');
        });

        analyzeBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();
            if (!text) return;

            // UI State
            analyzeBtn.disabled = true;
            status.classList.remove('hidden');
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) throw new Error('Failed to parse logic.');
                
                analysisData = await response.json();
                renderResults();
                
                emptyState.classList.add('hidden');
                resultsWrapper.classList.remove('hidden');
            } catch (error) {
                alert(error.message);
            } finally {
                analyzeBtn.disabled = false;
                status.classList.add('hidden');
            }
        });

        function renderResults() {
            renderLogicFlow();
            renderVisualMap();
        }

        function renderLogicFlow() {
            logicFlowView.innerHTML = '';
            analysisData.sentences.forEach((s, idx) => {
                const sBlock = document.createElement('div');
                sBlock.className = 'space-y-4';
                
                const header = `
                    <div class="flex items-center gap-3">
                        <span class="bg-blue-600 text-white px-2 py-0.5 rounded text-xs font-bold">${s.difficulty}</span>
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-tighter">Sentence #${idx + 1}</h3>
                    </div>
                    <div class="p-4 bg-slate-900 text-slate-100 rounded-xl text-sm italic font-medium">
                        "${s.logic_summary}"
                    </div>
                `;
                sBlock.innerHTML = header;

                const chunkContainer = document.createElement('div');
                chunkContainer.className = 'relative border-l-2 border-slate-100 ml-2 pl-6 space-y-6';

                s.chunks.forEach(chunk => {
                    const card = document.createElement('div');
                    card.className = 'relative group';
                    card.innerHTML = `
                        <div class="absolute -left-[31px] top-2 w-4 h-4 rounded-full bg-white border-4 border-slate-200 group-hover:border-blue-500 transition-colors"></div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[10px] font-black uppercase tracking-widest text-blue-500">${chunk.logic_tag}</span>
                            <p class="text-lg font-semibold ${chunk.color_class}">${chunk.text}</p>
                            <p class="text-sm text-slate-500 leading-relaxed mt-1">
                                <span class="text-slate-300 font-bold mr-1">EXPECTATION:</span> ${chunk.mental_note}
                            </p>
                        </div>
                    `;
                    chunkContainer.appendChild(card);
                });

                sBlock.appendChild(chunkContainer);
                logicFlowView.appendChild(sBlock);
            });
        }

        function renderVisualMap() {
            visualMapView.innerHTML = '';
            analysisData.sentences.forEach((s, idx) => {
                const sBlock = document.createElement('div');
                sBlock.className = 'bg-slate-50 p-6 rounded-2xl border border-slate-100 relative';
                
                const content = document.createElement('div');
                content.className = 'text-xl leading-relaxed';

                s.chunks.forEach(chunk => {
                    const span = document.createElement('span');
                    span.className = `chunk-span relative inline px-1 rounded transition-all cursor-help ${chunk.color_class} hover:bg-white hover:shadow-sm`;
                    span.textContent = chunk.text;
                    
                    const tooltip = document.createElement('div');
                    tooltip.className = 'tooltip';
                    tooltip.innerHTML = `<b class="text-blue-400 text-[10px] uppercase">${chunk.logic_tag}</b><br>${chunk.mental_note}`;
                    
                    span.appendChild(tooltip);
                    content.appendChild(span);
                });

                sBlock.appendChild(content);
                visualMapView.appendChild(sBlock);
            });
        }
    </script>
</body>
</html>
